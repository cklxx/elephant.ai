name: http_llm_sql_aggregation
description: "Real LLM generates constrained SQL"
tags: [http, manual, llm, generation]

eval:
  objective: "验证 LLM 在约束下生成可读 SQL 聚合查询"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["代码生成", "约束遵循", "数据聚合表达"]
  completion_criteria:
    - "ReplyMessage 包含 SELECT/FROM/GROUP BY/ORDER BY"
    - "ReplyMessage 包含 orders 表名"
  design_rationale: "SQL 生成能同时检验结构化语法和约束遵循能力。"

turns:
  - sender_id: "ou_http_llm_sql_user"
    chat_id: "oc_http_llm_sql"
    message_id: "om_http_llm_sql_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_sql_user"
    chat_id: "oc_http_llm_sql"
    message_id: "om_http_llm_sql_002"
    content: "独立测试题。请写一条 SQL：统计 orders 表中每个 status 的订单数，并按订单数降序。要求使用大写关键字，且必须包含 SELECT、FROM、GROUP BY、ORDER BY。不要提问。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["SELECT", "FROM", "orders", "GROUP BY", "ORDER BY"]
