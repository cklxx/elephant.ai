name: http_llm_requirement_to_testcases
description: "Real LLM converts requirement into concrete testcases"
tags: [http, manual, llm, test-design]

eval:
  objective: "验证 LLM 将产品需求转化为可执行测试用例"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["需求理解", "测试设计", "结构化表达"]
  completion_criteria:
    - "ReplyMessage 包含 TC1/TC2/TC3"
    - "每条包含 输入: 与 期望: 标签"
  design_rationale: "需求到测试用例转换是评测体系设计能力的核心场景。"

turns:
  - sender_id: "ou_http_llm_tc_user"
    chat_id: "oc_http_llm_tc"
    message_id: "om_http_llm_tc_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_tc_user"
    chat_id: "oc_http_llm_tc"
    message_id: "om_http_llm_tc_002"
    content: "独立测试题。需求：用户发送 /task status 且未提供 task_id 时，系统必须返回清晰用法提示。请输出 3 条测试用例，格式必须是 TC1/TC2/TC3，每条都要包含“输入:”和“期望:”。不要提问。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["TC1", "TC2", "TC3", "输入:", "期望:"]
