name: http_manual_real_chat
description: "Manual real reasoning case with structured response expectations"
tags: [http, manual, llm, reasoning]

eval:
  objective: "验证真实 LLM 场景下的结构化任务完成能力（方案 + 验收标准）"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["结构化输出", "方案设计", "验收标准表达"]
  completion_criteria:
    - "回复至少包含 1/2/3 三个步骤"
    - "回复包含 验收标准"
  design_rationale: "命令类 case 主要测路由稳定性；本 case 额外评估 agent 的任务完成质量。"

turns:
  - sender_id: "ou_http_llm_plan_user"
    chat_id: "oc_http_manual"
    message_id: "om_http_manual_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_plan_user"
    chat_id: "oc_http_manual"
    message_id: "om_http_manual_002"
    content: "独立测试题。请输出三步计划，主题是“优化 lark agent 真实端到端评测”。必须使用 1/2/3 编号，并在每一步后写“验收标准: ...”。不要提问，不要给额外前言。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["1", "2", "3", "验收标准"]
