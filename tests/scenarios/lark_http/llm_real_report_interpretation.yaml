name: http_llm_real_report_interpretation
description: "Real repo task: interpret existing eval report artifact"
tags: [http, llm, realwork]

eval:
  objective: "验证 LLM 能读取已有评测产物并做结构化解读"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["文件读取", "数据解读", "结构化输出"]
  completion_criteria:
    - "回复包含 TOTAL/PASSED/FAILED/SCORE"
    - "回复包含一句风险结论"
  design_rationale: "真实团队日常会基于评测报告做快速汇报和判断。"

turns:
  - sender_id: "ou_http_llm_real_report"
    chat_id: "oc_http_llm_real_report"
    message_id: "om_http_llm_real_report_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_real_report"
    chat_id: "oc_http_llm_real_report"
    message_id: "om_http_llm_real_report_002"
    content: "真实任务：读取 tmp/eval/lark_http_llm_manual.json（如果存在）并输出一段结构化摘要。必须包含字段：TOTAL=、PASSED=、FAILED=、SCORE=，最后加一行 RISK=...。不要提问。"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["TOTAL=", "PASSED=", "FAILED=", "SCORE=", "RISK="]
