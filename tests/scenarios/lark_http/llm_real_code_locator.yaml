name: http_llm_real_code_locator
description: "Real repo task: locate auto_reply related definitions"
tags: [http, llm, realwork]

eval:
  objective: "验证 LLM 能在真实代码中定位关键配置定义位置"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["代码检索", "路径定位", "信息提取"]
  completion_criteria:
    - "回复包含 4 个目标文件路径"
    - "回复包含 auto_reply 或 max_auto_reply_rounds 关键词"
  design_rationale: "真实排障和评审都先从定位代码入口开始。"

turns:
  - sender_id: "ou_http_llm_real_locator"
    chat_id: "oc_http_llm_real_locator"
    message_id: "om_http_llm_real_locator_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_real_locator"
    chat_id: "oc_http_llm_real_locator"
    message_id: "om_http_llm_real_locator_002"
    content: "真实任务：在当前仓库中定位 auto_reply 或 max_auto_reply_rounds 的定义位置。请输出至少 4 行，每行格式 FILE=<路径>。不要解释，不要提问。"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains:
            - "cmd/alex/lark_scenario_cmd.go"
            - "internal/delivery/channels/lark/inject_sync.go"
            - "internal/delivery/server/http/handler_lark_inject.go"
            - "internal/delivery/channels/lark/testing/scenario.go"
