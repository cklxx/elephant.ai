name: http_task_history_empty
description: "HTTP inject /task history should show no history for a fresh chat"
tags: [http, command, task-management]

eval:
  objective: "验证历史记录空状态反馈，避免用户误判系统异常"
  difficulty: "L2"
  category: "task-command"
  capabilities: ["历史查询", "空状态处理"]
  completion_criteria:
    - "ReplyMessage 包含 没有任务记录"
  design_rationale: "历史查询是自助排障入口，空状态必须明确不是错误。"

turns:
  - sender_id: "ou_http_user"
    chat_id: "oc_http_task_history_empty"
    message_id: "om_http_task_history_empty_001"
    content: "/task history"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["没有任务记录"]
