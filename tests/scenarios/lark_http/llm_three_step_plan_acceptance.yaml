name: http_llm_three_step_plan_acceptance
description: "Real LLM planning with mandatory section markers"
tags: [http, manual, llm, planning]

eval:
  objective: "验证 LLM 输出三步计划并显式给出统一验收段落"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["方案设计", "结构化输出", "验收标准表达"]
  completion_criteria:
    - "ReplyMessage 包含 STEP1/STEP2/STEP3"
    - "ReplyMessage 包含 ACCEPTANCE"
  design_rationale: "通过强制标记语法避免仅靠关键词偶然命中，更直接评估任务完成度。"

turns:
  - sender_id: "ou_http_llm_accept_user"
    chat_id: "oc_http_llm_plan"
    message_id: "om_http_llm_plan_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_accept_user"
    chat_id: "oc_http_llm_plan"
    message_id: "om_http_llm_plan_002"
    content: "独立测试题。请给出“提升 Lark agent 真实端到端评测质量”的三步计划。必须严格包含且仅包含这些段落标记：STEP1:, STEP2:, STEP3:, ACCEPTANCE:。不要提问，直接输出。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["STEP1:", "STEP2:", "STEP3:", "ACCEPTANCE:"]
