name: http_task_help_command
description: "HTTP inject /task help should return task usage"
tags: [http, command, task-management]

eval:
  objective: "验证任务命令帮助文档在真实链路可读且完整"
  difficulty: "L2"
  category: "task-command"
  capabilities: ["命令路由", "帮助信息输出"]
  completion_criteria:
    - "ReplyMessage 包含 Task command usage"
    - "ReplyMessage 包含 /task status <id>"
  design_rationale: "帮助文档是误操作恢复入口，覆盖命令全集可以降低支持成本。"

turns:
  - sender_id: "ou_http_user"
    chat_id: "oc_http_task_help"
    message_id: "om_http_task_help_001"
    content: "/task help"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["Task command usage", "/task status <id>"]
