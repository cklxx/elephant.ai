name: http_task_cancel_usage
description: "HTTP inject /task cancel without id should return usage"
tags: [http, command, task-management]

eval:
  objective: "验证取消命令参数校验：无 task_id 时不执行取消逻辑"
  difficulty: "L2"
  category: "task-command"
  capabilities: ["参数校验", "错误处理"]
  completion_criteria:
    - "ReplyMessage 包含 用法: /task cancel <task_id>"
  design_rationale: "取消操作具有破坏性，必须先通过参数校验再进入状态修改路径。"

turns:
  - sender_id: "ou_http_user"
    chat_id: "oc_http_task_cancel_usage"
    message_id: "om_http_task_cancel_usage_001"
    content: "/task cancel"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["用法: /task cancel <task_id>"]
