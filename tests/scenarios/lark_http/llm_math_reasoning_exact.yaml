name: http_llm_math_reasoning_exact
description: "Real LLM arithmetic reasoning with strict output token"
tags: [http, manual, llm, reasoning]

eval:
  objective: "验证 LLM 在真实链路中完成算式推理并遵守严格输出格式"
  difficulty: "L4"
  category: "reasoning"
  capabilities: ["算术推理", "格式约束遵循"]
  completion_criteria:
    - "ReplyMessage 包含 RESULT="
    - "ReplyMessage 包含 622"
  design_rationale: "命令路由类 case 无法证明推理能力；该题验证算式推理与格式约束的组合能力。"

turns:
  - sender_id: "ou_http_llm_math_user"
    chat_id: "oc_http_llm_math"
    message_id: "om_http_llm_math_001"
    content: "/new"
    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]

  - sender_id: "ou_http_llm_math_user"
    chat_id: "oc_http_llm_math"
    message_id: "om_http_llm_math_002"
    content: "独立测试题。请计算 (37*19) - (18*7) + 45。请只输出一行，格式必须是 RESULT=<数字>。不要解释，不要提问。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["RESULT=", "622"]
