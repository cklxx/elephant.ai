name: http_tasks_empty_list
description: "HTTP inject /tasks should show no active tasks for a fresh chat"
tags: [http, command, task-management]

eval:
  objective: "验证空任务列表展示文案，确保新会话状态可解释"
  difficulty: "L2"
  category: "task-command"
  capabilities: ["任务列表查询", "空状态文案"]
  completion_criteria:
    - "ReplyMessage 包含 当前没有活跃任务"
  design_rationale: "空状态是用户进入任务系统的第一触点，文案决定下一步行为。"

turns:
  - sender_id: "ou_http_user"
    chat_id: "oc_http_tasks_empty"
    message_id: "om_http_tasks_empty_001"
    content: "/tasks"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["当前没有活跃任务"]
