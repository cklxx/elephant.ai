name: http_new_session_command
description: "HTTP inject /new command should open a new session"
tags: [http, command, session]

eval:
  objective: "验证会话重建：/new 能明确创建新上下文并反馈成功"
  difficulty: "L2"
  category: "session-command"
  capabilities: ["命令执行", "会话切换", "状态反馈"]
  completion_criteria:
    - "ReplyMessage 包含 已开启新会话"
  design_rationale: "这是用户主动切上下文的核心能力，必须在真实链路稳定可用。"

turns:
  - sender_id: "ou_http_user"
    chat_id: "oc_http_new"
    message_id: "om_http_new_001"
    content: "/new"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["已开启新会话"]
