name: teams_timeout
description: "Team dispatch timeout — reply includes timeout notice and background continuation"
tags: [teams, timeout, p2p]

setup:
  config:
    session_prefix: "test-lark"
    allow_direct: true
  llm_mode: mock

turns:
  - sender_id: "ou_user_teams_003"
    chat_id: "oc_chat_teams_003"
    message_id: "om_msg_teams_to_001"
    content: "启动全面代码审查"

    mock_response:
      answer: "团队任务已超时，但仍在后台继续运行。当前进度：2/5 角色已完成。\n\n你可以稍后询问进度，我会汇报最新状态。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["超时", "后台"]
      executor:
        task_contains: ["代码审查"]
