name: teams_await_user_input
description: "Team dispatch with await_user_input — agent pauses for user input then completes"
tags: [teams, await-input, multi-turn, p2p]

setup:
  config:
    session_prefix: "test-lark"
    allow_direct: true
  llm_mode: mock

turns:
  # Turn 1: Agent returns await_user_input — gateway prompts user to continue
  - sender_id: "ou_user_teams_005"
    chat_id: "oc_chat_teams_005"
    message_id: "om_msg_teams_ai_001"
    content: "帮我重构支付模块"

    mock_response:
      answer: ""
      stop_reason: "await_user_input"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["补充信息"]

  # Turn 2: User replies with input, agent completes the team dispatch
  - sender_id: "ou_user_teams_005"
    chat_id: "oc_chat_teams_005"
    message_id: "om_msg_teams_ai_002"
    content: "选择渐进式重构方案"

    mock_response:
      answer: "已按渐进式重构方案启动团队。3 个角色已派发完成。"

    assertions:
      messenger:
        - method: ReplyMessage
          content_contains: ["渐进式重构", "完成"]
