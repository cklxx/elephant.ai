version: 1
updated: 2026-02-23
rules:
  - type: error_entry
    prefix: err
  - type: error_summary
    prefix: errsum
  - type: good_entry
    prefix: good
  - type: good_summary
    prefix: goodsum
  - type: plan
    prefix: plan
  - type: long_term
    prefix: ltm
format: "<prefix>-YYYY-MM-DD-<slug>"
slug_rules:
  - lowercase
  - hyphenated
  - max_length: 80
