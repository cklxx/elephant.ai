id: 2026-02-26-inject-thinking-chain-hard-checks
title: Validate and harden inject thinking chain with explicit API/return checks
status: completed
owner: codex
created: 2026-02-26
updated: 2026-02-26T15:11:00+08:00
summary: >
  Build deterministic diagnostics for the inject -> LLM -> Lark chain and
  close parser gaps that may drop thinking payloads. Ensure end-to-end output
  clearly reports whether thinking exists in request, response, and Lark replies.
scope:
  in:
    - Extend OpenAI Responses reasoning parser to cover summary-based payload variants
    - Update Lark result dispatch to emit thinking and final answer as separate messages when both exist
    - Strengthen inject e2e script with 4 explicit checks (request reasoning, response thinking, Lark thinking, multi-message)
    - Add/adjust tests for parser and Lark dispatch behavior
    - Validate via go tests and real inject run
  out:
    - Provider-side model behavior changes (upstream thinking generation policy)
    - Unrelated channel/progress UX redesign
steps:
  - id: parser-coverage
    description: Support reasoning summary variants in stream/completed parsing and add tests
    status: completed
  - id: lark-split-dispatch
    description: Send thinking and final answer as separate messages when both are present
    status: completed
  - id: e2e-checks
    description: Expand inject e2e script with explicit chain checks and clear failure signals
    status: completed
  - id: validate
    description: Run targeted tests and real inject to confirm request/response/Lark behavior
    status: completed
acceptance_criteria:
  - Parser captures thinking when it appears as summary arrays or summary text variants
  - Lark sends multiple messages when both thinking and answer exist, without prepending a thinking label
  - E2E script reports all 4 checks and pinpoints the failing segment in real runs
  - Targeted tests pass for llm and lark packages
notes:
  - Upstream may still return no thinking; diagnostics must distinguish provider omission from local parsing/dispatch bugs.
  - 2026-02-26: Real inject checks repeatedly show request reasoning present and response thinking absent on `gpt-5.3-codex-spark`; no Lark thinking message can be emitted without upstream thinking content.
