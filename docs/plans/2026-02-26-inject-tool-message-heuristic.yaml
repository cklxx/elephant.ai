id: 2026-02-26-inject-tool-message-heuristic
title: Add inject-chain heuristic to force tool-driven multi-message progress updates
status: completed
owner: codex
created: 2026-02-26
updated: 2026-02-26T15:35:00+08:00
summary: >
  Add a dev-inject heuristic so tests can request N rounds of tool-driven
  progress updates (channel send_message / lark_send_message) before final
  answer, then verify request/response/tool-call behavior end-to-end.
scope:
  in:
    - Extend inject request schema with tool_message_rounds
    - Inject deterministic heuristic instruction into task content when rounds > 0
    - Update inject e2e script to send tool_message_rounds and check send-message tool usage
    - Add unit tests for lark inject sync and HTTP handler
  out:
    - Provider/model behavior changes for reasoning summary support
    - Production-default Lark task execution policy changes outside inject endpoint
steps:
  - id: inject-request-schema
    description: Add tool_message_rounds to HTTP and gateway inject request structs
    status: completed
  - id: heuristic-task-wrapper
    description: Wrap injected task with strict tool-driven progress messaging instructions
    status: completed
  - id: diagnostics-script
    description: Extend e2e script checks for send-message tool calls and multi-message output
    status: completed
  - id: tests-and-validate
    description: Add tests and run focused go test packages + real inject check
    status: completed
acceptance_criteria:
  - Inject API accepts tool_message_rounds and passes it through to gateway execution
  - Injected task text contains deterministic tool-message instructions when rounds > 0
  - E2E script reports send-message tool-call check and message count checks
  - Focused tests pass for lark/http packages touched by change
notes:
  - Heuristic is intentionally scoped to dev inject path to avoid surprise behavior changes in normal chat flow.
  - 2026-02-26: Real inject run with tool_message_rounds=5 produced CHECK_TOOL_SEND_MESSAGE_CALLED=1 and CHECK_LARK_MULTI_MESSAGE=1, while response thinking remained empty on gpt-5.3-codex-spark.
