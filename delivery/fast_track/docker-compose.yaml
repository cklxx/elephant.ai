version: "3.9"

services:
  wecom-fast-track:
    image: python:3.11-slim
    container_name: wecom-fast-track
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - ./docs:/app/docs
      - ./configs:/app/configs
    env_file:
      - ./configs/.env
    command: >
      bash -lc "
      pip install --no-cache-dir pyyaml requests &&
      python scripts/wecom_data_connector.py &&
      python scripts/sop_deployer.py &&
      python scripts/daily_dashboard_generator.py
      "

