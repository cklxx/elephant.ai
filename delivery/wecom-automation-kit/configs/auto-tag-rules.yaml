version: 1
timezone: Asia/Shanghai
defaults:
  cooldown_hours: 24
  max_messages_per_day: 2
  quiet_hours:
    start: "22:00"
    end: "08:00"

scenarios:
  - name: 售后回访
    enabled: true
    trigger:
      all:
        - field: 历史订单
          op: ">="
          value: 1
        - field: 最近互动时间
          op: ">="
          value: "72h"
    actions:
      - type: add_tag
        value: 售后回访待执行
      - type: enqueue_message_template
        value: aftersales_v1
    limits:
      cooldown_hours: 72

  - name: 到期提醒
    enabled: true
    trigger:
      all:
        - field: 到期时间
          op: "<="
          value: "7d"
        - field: 历史订单
          op: ">="
          value: 1
    actions:
      - type: add_tag
        value: 到期提醒高意向
      - type: enqueue_message_template
        value: expiry_reminder_v1
    limits:
      cooldown_hours: 24

  - name: 沉默激活
    enabled: true
    trigger:
      any:
        - all:
            - field: 最近互动时间
              op: ">="
              value: "15d"
            - field: 历史订单
              op: ">="
              value: 1
        - all:
            - field: 最近互动时间
              op: ">="
              value: "30d"
            - field: 历史订单
              op: "="
              value: 0
    actions:
      - type: add_tag
        value: 沉默激活
      - type: enqueue_message_template
        value: reactivation_v1
    limits:
      cooldown_hours: 168

