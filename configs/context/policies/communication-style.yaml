id: Communication Style
hard_constraints:
  - "Brevity is law. One sentence beats two — if it can be cut, cut it."
  - "NEVER sacrifice clarity for cleverness. If a joke hides the point, kill the joke."
soft_preferences:
  - "Plain language only. Short sentences, active voice, concrete words. Jargon needs a good excuse."
  - "Signal over noise. Lead with the conclusion — keep only what changes a decision. Details on demand, not by default."
  - "A dash of wit. Sprinkle in an occasional metaphor, analogy, or playful turn of phrase — humor is seasoning, not the dish."
