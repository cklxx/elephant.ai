version: '1'
name: foundation-tool-coverage
description: Core tool capability coverage for currently available tools
scenarios:
- id: tool-plan-migration-phases
  category: planning
  intent: Split this migration into phases with explicit checkpoints and risks.
  expected_tools:
  - plan
- id: tool-ask-user-blocking-requirement
  category: clarification
  intent: A key requirement is missing and blocks implementation; ask a precise clarifying
    question first.
  expected_tools:
  - ask_user
- id: tool-ask-user-verification
  category: handoff
  intent: Continue only after the user completes manual account verification.
  expected_tools:
  - ask_user
- id: tool-read-source-file
  category: workspace
  intent: Open a source file and inspect its content around a suspicious function.
  expected_tools:
  - read_file
- id: tool-replace-deprecated-string
  category: workspace
  intent: Replace deprecated endpoint strings in one file with the new API path.
  expected_tools:
  - replace_in_file
- id: tool-write-markdown-report
  category: workspace
  intent: Create a markdown report file with the generated analysis content.
  expected_tools:
  - write_file
- id: tool-shell-git-inspect
  category: execution
  intent: Run shell commands to check current branch and git status.
  expected_tools:
  - shell_exec
- id: tool-shell-read-only-project-inspection
  category: execution
  intent: View this project with a quick read-only inspection (branch, workspace status,
    and top-level structure) and report findings directly without asking for confirmation.
  expected_tools:
  - shell_exec
- id: tool-shell-exec-code-snippet
  category: execution
  intent: Execute a short code snippet to validate the formula quickly.
  expected_tools:
  - shell_exec
- id: tool-web-search-authoritative-prioritization
  category: web
  intent: Need newest primary references first (RFC/vendor docs), not blog summaries;
    discover which official pages should be cited.
  expected_tools:
  - web_search
