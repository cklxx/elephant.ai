version: "1"
name: "attention-interruption-control"
description: "Evaluate interruption minimization and decision-only escalation behavior."
scenarios:
  - id: "interrupt-batch-status-update"
    category: "attention_saving"
    intent: "Summarize ongoing progress into a single artifact and avoid interrupting the user for every intermediate step."
    expected_tools: ["artifacts_write"]
    deliverable:
      output_description: "single progress artifact with key milestones"
      artifact_required: true
      required_evidence: ["milestones", "blocking_risks"]

  - id: "interrupt-single-approval-gate"
    category: "attention_saving"
    intent: "A permission-gated action is blocked; ask the user once with the full approval context."
    expected_tools: ["request_user"]

  - id: "interrupt-nonblocking-gap"
    category: "attention_saving"
    intent: "There is a minor non-blocking ambiguity; continue with a best-effort plan instead of interrupting immediately."
    expected_tools: ["plan"]

  - id: "interrupt-blocking-ambiguity"
    category: "attention_saving"
    intent: "A core requirement is missing and blocks safe execution; ask one focused clarification question."
    expected_tools: ["clarify"]
