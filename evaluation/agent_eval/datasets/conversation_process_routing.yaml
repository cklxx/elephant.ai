version: "2"
name: "conversation-process-routing"
description: "Three-mode brain routing: respond(mode=direct/think/delegate) vs stop_worker vs query tools. Tests the conversation brain's ability to pick the right response mode."
scenarios:
  # -----------------------------------------------------------------------
  # direct mode: greetings, chitchat, simple Q&A, acknowledgements
  # -----------------------------------------------------------------------
  - id: "direct-greeting-zh"
    category: "direct"
    intent: "你好"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-greeting-en"
    category: "direct"
    intent: "hey"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-thanks-zh"
    category: "direct"
    intent: "谢谢"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-chitchat-zh"
    category: "direct"
    intent: "今天天气怎么样"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-simple-qa"
    category: "direct"
    intent: "Go 的 goroutine 和 thread 有什么区别"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-acknowledgement"
    category: "direct"
    intent: "好的知道了"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-emoji-only"
    category: "direct"
    intent: "👍"
    expected_tools: ["respond"]
    expected_mode: "direct"

  - id: "direct-question-about-task"
    category: "direct"
    intent: "刚才那个任务是干什么的"
    expected_tools: ["respond"]
    expected_mode: "direct"

  # -----------------------------------------------------------------------
  # think mode: questions that need reasoning or lookup
  # -----------------------------------------------------------------------
  - id: "think-recent-changes"
    category: "think"
    intent: "昨天改了什么"
    expected_tools: ["respond"]
    expected_mode: "think"

  - id: "think-cost-trend"
    category: "think"
    intent: "最近 cost 涨了多少，什么原因"
    expected_tools: ["respond"]
    expected_mode: "think"

  - id: "think-architecture-question"
    category: "think"
    intent: "conversation process 的架构是怎么设计的"
    expected_tools: ["respond"]
    expected_mode: "think"

  - id: "think-comparison"
    category: "think"
    intent: "对比一下 Redis 和 Memcached 哪个更适合我们的场景"
    expected_tools: ["respond"]
    expected_mode: "think"

  - id: "think-debug-analysis"
    category: "think"
    intent: "最近 flaky test 有什么规律吗"
    expected_tools: ["respond"]
    expected_mode: "think"

  # -----------------------------------------------------------------------
  # delegate mode: action requests needing background work
  # -----------------------------------------------------------------------
  - id: "delegate-code-refactor"
    category: "delegate"
    intent: "重构一下 auth 模块"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-research-paper"
    category: "delegate"
    intent: "搜索最新的 agent 记忆论文"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-write-doc"
    category: "delegate"
    intent: "帮我写一份技术方案"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-code-review"
    category: "delegate"
    intent: "review 一下最近的 PR"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-debug"
    category: "delegate"
    intent: "帮我看看为什么 CI 挂了"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-analysis-en"
    category: "delegate"
    intent: "analyze the performance bottleneck in the API gateway"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-build-feature"
    category: "delegate"
    intent: "实现一个用户通知的功能"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-implicit-action"
    category: "delegate"
    intent: "把 auth 模块改成用 context 传递 token"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-short-command"
    category: "delegate"
    intent: "lint"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  - id: "delegate-url-request"
    category: "delegate"
    intent: "打开 https://example.com 看看能不能访问"
    expected_tools: ["respond"]
    expected_mode: "delegate"

  # -----------------------------------------------------------------------
  # delegate mode (inject): follow-up to running task
  # -----------------------------------------------------------------------
  - id: "delegate-inject-followup"
    category: "delegate_inject"
    intent: "用 PostgreSQL 不要用 MySQL"
    expected_tools: ["respond"]
    expected_mode: "delegate"
    worker_status: "#1 running (重构 auth 模块, 45s)"

  - id: "delegate-inject-correction"
    category: "delegate_inject"
    intent: "对了，数据库用 PostgreSQL 不要用 SQLite"
    expected_tools: ["respond"]
    expected_mode: "delegate"
    worker_status: "#1 running (搭建后端服务, 30s)"

  - id: "delegate-cross-task-ref"
    category: "delegate_inject"
    intent: "用 #1 的结果继续做"
    expected_tools: ["respond"]
    expected_mode: "delegate"
    worker_status: "#1 completed (分析数据)"

  # -----------------------------------------------------------------------
  # stop_worker: cancel/abort
  # -----------------------------------------------------------------------
  - id: "stop-explicit-zh"
    category: "stop"
    intent: "停"
    expected_tools: ["stop_worker"]

  - id: "stop-cancel-zh"
    category: "stop"
    intent: "取消任务"
    expected_tools: ["stop_worker"]

  - id: "stop-abort-en"
    category: "stop"
    intent: "cancel that"
    expected_tools: ["stop_worker"]
    worker_status: "#1 running (research papers, 20s)"

  - id: "stop-specific-task"
    category: "stop"
    intent: "停掉 #1"
    expected_tools: ["stop_worker"]
    worker_status: "#1 running (重构 auth 模块, 60s)"

  - id: "stop-dont-do-it"
    category: "stop"
    intent: "别做了"
    expected_tools: ["stop_worker"]

  - id: "stop-nevermind"
    category: "stop"
    intent: "算了不用了"
    expected_tools: ["stop_worker"]

  - id: "stop-mixed-stop-and-new"
    category: "stop"
    intent: "停掉现在的，不做了"
    expected_tools: ["stop_worker"]
