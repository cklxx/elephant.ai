  expected_exec_command: python3 skills/anygen/run.py '{...}'
  prompt: "You are validating repository skill \"anygen\".\nMandatory steps:\n1) Call\
    \ the `skills` tool with action=show and name=\"anygen\".\n2) Do not call any\
