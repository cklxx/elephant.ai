name: Feature Request
description: Suggest a new feature or improvement for elephant.ai
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand what you need.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the current pain point?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution. How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions or workarounds have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of elephant.ai does this relate to?
      options:
        - Agent Core (ReAct loop, events, approvals)
        - Memory System
        - Skills
        - LLM Providers
        - Lark Integration
        - Web Console
        - CLI / TUI
        - MCP / Tool System
        - Observability
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, screenshots, references, or related issues.
