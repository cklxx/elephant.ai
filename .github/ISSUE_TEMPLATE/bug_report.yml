name: Bug Report
description: Report a bug to help us improve elephant.ai
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below so we can investigate.

  - type: input
    id: version
    attributes:
      label: elephant.ai Version
      description: Output of `alex version` or the commit hash you're running.
      placeholder: v0.1.0 or 8bc55138
    validations:
      required: true

  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM Provider
      description: Which LLM provider were you using when the bug occurred?
      options:
        - OpenAI
        - Anthropic (Claude)
        - DeepSeek
        - ByteDance ARK (Doubao)
        - Kimi
        - Ollama
        - Qwen
        - OpenRouter
        - Auto (default)
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: delivery-surface
    attributes:
      label: Delivery Surface
      description: Where did the bug occur?
      options:
        - Lark
        - Web Console
        - CLI / TUI
        - API Server
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide your environment details.
      value: |
        - OS: [e.g., macOS 15.2, Ubuntu 24.04]
        - Go version: [e.g., 1.24.0]
        - Node.js version (if web related): [e.g., 20.11.0]
        - Deployment: [local dev / Docker / production]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Send message '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant log output. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config snippets that might help.
