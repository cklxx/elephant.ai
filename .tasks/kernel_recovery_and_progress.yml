version: "1"
tasks:
  - id: research-recovery
    title: Recover research-executor failure
    description: Diagnose and recover research-executor from last cycle failure
    agent: codex
    prompt: |
      Investigate the research-executor failure in cycle run-d5nBi6fz4kjt.
      Check logs in /Users/bytedance/code/elephant.ai/logs/ for the failure pattern.
      If it's a transient issue, propose a fix. If it's a systemic issue, document it.
      Output findings to artifacts/research_recovery_$(date +%Y%m%dT%H%M%SZ).md
    workspace_mode: worktree

  - id: audit-recovery
    title: Recover audit-executor failure
    description: Diagnose and recover audit-executor from last cycle failure
    agent: codex
    prompt: |
      Investigate the audit-executor failure in cycle run-d5nBi6fz4kjt.
      Check logs and identify root cause.
      Apply fix if within scope, or document mitigation plan.
      Output to artifacts/audit_recovery_$(date +%Y%m%dT%H%M%SZ).md
    workspace_mode: worktree

  - id: pilot-outreach-followup
    title: Drive pilot outreach forward
    description: Check pilot_top2_outreach status and advance to next step
    agent: codex
    prompt: |
      Read artifacts/pilot_top2_outreach_20260225.md and artifacts/intent_fee_collection_status_20260225.md
      Assess current state: have payments been received? What's blocking?
      If no payment confirmation, draft escalation message or alternative path.
      Create next-action artifact with specific executable steps.
      Output to artifacts/pilot_outreach_next_action_$(date +%Y%m%dT%H%M%SZ).md
    workspace_mode: worktree

  - id: kernel-health-verify
    title: Verify kernel health post-resilience-patch
    description: Run targeted tests to confirm resilience patch holds
    agent: codex
    prompt: |
      Run kernel package tests: go test ./internal/app/agent/kernel/... -v -count=1
      Verify all PASS. If any FAIL, capture logs and propose fix.
      Output verification report to artifacts/kernel_health_verify_$(date +%Y%m%dT%H%M%SZ).md
    workspace_mode: worktree
