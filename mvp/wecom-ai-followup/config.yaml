wecom:
  corp_id: "${WECOM_CORP_ID}"        # 企业ID，占位符
  corp_secret: "${WECOM_CORP_SECRET}" # 应用Secret，占位符
  agent_id: "${WECOM_AGENT_ID}"       # 应用AgentID，占位符
  token_url: "https://qyapi.weixin.qq.com/cgi-bin/gettoken"
  send_url: "https://qyapi.weixin.qq.com/cgi-bin/message/send"
  dry_run: true                        # true=无密钥可跑通框架日志

templates:
  after_sales_followup: |
    {customer_name}，您好～
    看到您已购买超过 {hours} 小时，来做个售后回访：
    1) 当前使用是否顺利？
    2) 是否需要我们提供快速上手指引？
    直接回复这条消息，我们会第一时间跟进。

triggers:
  # 标准 cron: 分 时 日 月 周
  # MVP 默认每 10 分钟扫描一次“已购满24h且未触达”的客户
  after_sales_followup_cron: "*/10 * * * *"

rules:
  after_sales_followup:
    delay_hours_after_purchase: 24
    dedup_key: "order_id"
    channel: "wecom_message"

