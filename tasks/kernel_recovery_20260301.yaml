version: "1"
title: "Kernel Recovery Cycle - March 1, 2026"
description: "Investigate failed agents from run-d5nBi6fz4kjt, verify kernel health, and continue build tasks"
created_at: "2026-03-01T07:00:00Z"
tasks:
  - id: failed-agent-investigator
    role: investigator
    description: "Investigate why research-executor and audit-executor failed in cycle run-d5nBi6fz4kjt"
    prompt: |
      Search for evidence of the failed agents (research-executor, audit-executor) from cycle run-d5nBi6fz4kjt.
      
      1. Look in ./logs/ for any run-d5nBi6fz4kjt related files
      2. Check for agent error logs, session files, or any artifacts
      3. If no logs exist, check the system for common failure modes:
         - Out of memory
         - Context timeouts
         - LLM API failures
         - File system issues
      
      Report: failure cause, evidence location, recommended fix.
    expected_output: "failure_investigation_report.md"

  - id: kernel-health-verifier
    role: health-checker
    description: "Verify kernel health after resilience patch"
    prompt: |
      Verify the kernel is healthy after the context decoupling patch.
      
      1. Run: go test ./internal/infra/kernel/... ./internal/infra/teamruntime/... ./internal/app/agent/... -v -count=1
      2. Check go vet ./...
      3. Verify the patch is still in place in runCycleWithLogging
      
      Report: test results, any regressions, confidence level for next cycle.
    expected_output: "kernel_health_report.md"

  - id: build-continuator
    role: continuator
    description: "Continue build tasks from successful agents"
    prompt: |
      The build-executor and data-executor succeeded in cycle run-d5nBi6fz4kjt.
      
      1. Read any artifacts they produced
      2. Identify next logical actions based on their outputs
      3. Execute those actions (file creation, code changes, etc.)
      
      Current context:
      - Previous work: pilot target list for 999元 offering
      - Recent patch: kernel context decoupling for resilience
      
      Move forward with any actionable items from the successful agents.
    expected_output: "build_continuation_report.md"
